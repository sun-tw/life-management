{% extends 'base.html' %}
{% block page_title %}{{ action }}投資{% endblock %}

{% block content %}
<div class="px-8 py-6">
  <!-- Breadcrumb -->
  <div class="flex items-center gap-2 text-sm text-slate-400 mb-6">
    <a href="{{ url_for('investments.index') }}" class="hover:text-indigo-600">投資管理</a>
    <span>/</span>
    <span class="text-slate-600">{{ action }}投資項目</span>
  </div>

  <div class="max-w-2xl">
    <div class="card p-6">
      <h2 class="text-xl font-bold text-slate-800 mb-6">{{ action }}投資項目</h2>

      <form method="POST"
            action="{{ url_for('investments.edit', id=investment.id) if investment else url_for('investments.add') }}"
            class="space-y-5">

        <!-- 名稱 & 類型 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">投資名稱 *</label>
            <input type="text" name="name" required
                   value="{{ investment.name if investment else '' }}"
                   placeholder="例如：台積電、00878 ETF"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">投資類型 *</label>
            <select name="investment_type" required
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none bg-white">
              {% for t in investment_types %}
              <option value="{{ t }}" {{ 'selected' if investment and investment.investment_type == t }}>{{ t }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- 機構 & 持有人 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">機構 / 券商</label>
            <input type="text" name="institution"
                   value="{{ investment.institution if investment else '' }}"
                   placeholder="例如：富邦證券、台灣銀行"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">持有人 *</label>
            <input type="text" name="owner_name" required
                   value="{{ investment.owner_name if investment else '' }}"
                   placeholder="例如：本人、太太"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
        </div>

        <!-- 投入金額 & 現值 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">投入金額 *</label>
            <input type="number" name="amount_invested" required min="0" step="0.01"
                   value="{{ investment.amount_invested if investment else '' }}"
                   placeholder="0"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">目前現值 *</label>
            <input type="number" name="current_value" required min="0" step="0.01"
                   value="{{ investment.current_value if investment else '' }}"
                   placeholder="0"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
        </div>

        <!-- 幣別 & 年化報酬率 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">幣別</label>
            <select name="currency"
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none bg-white">
              {% for c in currencies %}
              <option value="{{ c }}" {{ 'selected' if investment and investment.currency == c }}>{{ c }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">年化報酬率（%）</label>
            <input type="number" name="annual_return" step="0.01"
                   value="{{ investment.annual_return if investment else '' }}"
                   placeholder="例如：6.5"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
        </div>

        <!-- 購入日期 & 到期日 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">購入日期</label>
            <input type="date" name="purchase_date"
                   value="{{ investment.purchase_date.isoformat() if investment and investment.purchase_date else '' }}"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">到期日</label>
            <input type="date" name="maturity_date"
                   value="{{ investment.maturity_date.isoformat() if investment and investment.maturity_date else '' }}"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
        </div>

        <!-- 備註 -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">備註</label>
          <textarea name="notes" rows="3" placeholder="補充說明..."
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none resize-none">{{ investment.notes if investment else '' }}</textarea>
        </div>

        <!-- 按鈕 -->
        <div class="flex gap-3 pt-2">
          <button type="submit"
                  class="flex-1 py-2.5 rounded-xl text-white text-sm font-medium hover:opacity-90 transition"
                  style="background: #2C2C2A;">
            {{ action }}投資項目
          </button>
          <a href="{{ url_for('investments.index') }}"
             class="px-6 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 transition">
            取消
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
