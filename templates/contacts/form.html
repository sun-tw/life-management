{% extends 'base.html' %}
{% block page_title %}{{ action }}聯絡人{% endblock %}

{% block content %}
<div class="px-8 py-6">
  <!-- Breadcrumb -->
  <div class="flex items-center gap-2 text-sm text-slate-400 mb-6">
    <a href="{{ url_for('contacts.index') }}" class="hover:text-indigo-600">重要聯絡人</a>
    <span>/</span>
    <span class="text-slate-600">{{ action }}聯絡人</span>
  </div>

  <div class="max-w-2xl">
    <div class="card p-6">
      <h2 class="text-xl font-bold text-slate-800 mb-6">{{ action }}聯絡人</h2>

      <form method="POST"
            action="{{ url_for('contacts.edit', id=contact.id) if contact else url_for('contacts.add') }}"
            class="space-y-5">

        <!-- 姓名 & 類別 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">姓名 *</label>
            <input type="text" name="name" required
                   value="{{ contact.name if contact else '' }}"
                   placeholder="例如：王醫師"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">類別 *</label>
            <select name="category" required
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none bg-white">
              {% for cat in categories %}
              <option value="{{ cat }}" {{ 'selected' if contact and contact.category == cat }}>{{ cat }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- 關係 & 機構 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">關係 / 職稱</label>
            <input type="text" name="relationship"
                   value="{{ contact.relationship if contact else '' }}"
                   placeholder="例如：家庭醫師、律師"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">機構 / 單位</label>
            <input type="text" name="institution"
                   value="{{ contact.institution if contact else '' }}"
                   placeholder="例如：台大醫院、聯合律師事務所"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
        </div>

        <!-- 電話 & Email -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">電話</label>
            <input type="tel" name="phone"
                   value="{{ contact.phone if contact else '' }}"
                   placeholder="例如：02-1234-5678"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
            <input type="email" name="email"
                   value="{{ contact.email if contact else '' }}"
                   placeholder="example@email.com"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
        </div>

        <!-- 地址 -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">地址</label>
          <input type="text" name="address"
                 value="{{ contact.address if contact else '' }}"
                 placeholder="例如：台北市中正區..."
                 class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
        </div>

        <!-- 備註 -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">備註</label>
          <textarea name="notes" rows="3" placeholder="補充說明、看診時間、注意事項..."
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none resize-none">{{ contact.notes if contact else '' }}</textarea>
        </div>

        <!-- 重要聯絡人 -->
        <div class="flex items-center gap-3 p-4 bg-amber-50 rounded-xl border border-amber-200">
          <input type="checkbox" name="is_important" id="is_important"
                 value="1"
                 {{ 'checked' if contact and contact.is_important }}
                 class="w-4 h-4 rounded text-amber-500 accent-amber-500">
          <label for="is_important" class="text-sm font-medium text-amber-800 cursor-pointer">
            ⭐ 設為重要聯絡人（將置頂顯示）
          </label>
        </div>

        <!-- 按鈕 -->
        <div class="flex gap-3 pt-2">
          <button type="submit"
                  class="flex-1 py-2.5 rounded-xl text-white text-sm font-medium hover:opacity-90 transition"
                  style="background: linear-gradient(135deg, #4338ca, #6366f1);">
            {{ action }}聯絡人
          </button>
          <a href="{{ url_for('contacts.index') }}"
             class="px-6 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 transition">
            取消
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
