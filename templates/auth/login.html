<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 — 人生管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body>
<div class="min-h-screen flex" style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 60%, #4338ca 100%);">
  <!-- Left side: Quote -->
  <div class="hidden lg:flex flex-1 flex-col justify-center px-16 text-white">
    <div class="text-5xl mb-6">🌟</div>
    <h1 class="text-4xl font-bold mb-4 leading-tight">人生管理系統</h1>
    <p class="text-indigo-200 text-lg mb-8">掌握每一天，設計你想要的人生</p>
    <div class="bg-white/10 backdrop-blur rounded-2xl p-6 max-w-md">
      <div class="text-indigo-200 text-sm mb-2">💭 今日思考</div>
      <blockquote class="text-white text-lg font-light leading-relaxed">
        「人生不在於你活了多久，<br>而在於你活得有多深刻。」
      </blockquote>
    </div>
  </div>

  <!-- Right side: Login Form -->
  <div class="flex-1 flex items-center justify-center px-8">
    <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
      <div class="text-center mb-8">
        <div class="text-4xl mb-3">👤</div>
        <h2 class="text-2xl font-bold text-slate-800">歡迎回來</h2>
        <p class="text-slate-500 text-sm mt-1">請輸入您的帳號密碼</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="mb-4 p-3 rounded-lg text-sm
            {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200
            {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">帳號</label>
          <input type="text" name="username" required autofocus
                 class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                 placeholder="輸入帳號">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">密碼</label>
          <input type="password" name="password" required
                 class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                 placeholder="輸入密碼">
        </div>
        <button type="submit"
                class="w-full py-3 rounded-xl text-white font-semibold text-sm transition hover:opacity-90 active:scale-95"
                style="background: linear-gradient(135deg, #4338ca, #6366f1);">
          登入系統
        </button>
      </form>

      <div class="mt-6 text-center text-xs text-slate-400">
        家庭管理系統 · 僅限家庭成員使用
      </div>
    </div>
  </div>
</div>
</body>
</html>
