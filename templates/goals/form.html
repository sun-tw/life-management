{% extends 'base.html' %}
{% block page_title %}{{ action }}目標{% endblock %}

{% block content %}
<div class="px-8 py-6">
  <!-- Breadcrumb -->
  <div class="flex items-center gap-2 text-sm text-slate-400 mb-6">
    <a href="{{ url_for('goals.index') }}" class="hover:text-indigo-600">人生目標</a>
    <span>/</span>
    {% if goal %}
    <a href="{{ url_for('goals.detail', id=goal.id) }}" class="hover:text-indigo-600">{{ goal.title }}</a>
    <span>/</span>
    {% endif %}
    <span class="text-slate-600">{{ action }}</span>
  </div>

  <div class="max-w-2xl">
    <div class="card p-6">
      <h2 class="text-xl font-bold text-slate-800 mb-6">{{ action }}目標</h2>

      <form method="POST"
            action="{{ url_for('goals.edit', id=goal.id) if goal else url_for('goals.add') }}"
            class="space-y-5">

        <!-- 標題 -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">目標名稱 *</label>
          <input type="text" name="title" required
                 value="{{ goal.title if goal else '' }}"
                 placeholder="例如：學習 Python 程式語言"
                 class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
        </div>

        <!-- 類別 & 時程 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">類別 *</label>
            <select name="category" required
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none bg-white">
              {% for cat in categories %}
              <option value="{{ cat }}" {{ 'selected' if goal and goal.category == cat }}>{{ cat }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">時程 *</label>
            <select name="timeframe" required
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none bg-white">
              {% for tf in timeframes %}
              <option value="{{ tf }}" {{ 'selected' if goal and goal.timeframe == tf }}>{{ tf }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- 描述 -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">詳細說明</label>
          <textarea name="description" rows="4"
                    placeholder="描述您的目標，為什麼重要，如何達成..."
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none resize-none">{{ goal.description if goal else '' }}</textarea>
        </div>

        <!-- 目標日期 & 狀態 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">目標日期</label>
            <input type="date" name="target_date"
                   value="{{ goal.target_date.isoformat() if goal and goal.target_date else '' }}"
                   class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">狀態</label>
            <select name="status"
                    class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none bg-white">
              {% for s in statuses %}
              <option value="{{ s }}" {{ 'selected' if goal and goal.status == s }}>{{ s }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- 進度 -->
        <div x-data="{ progress: {{ goal.progress if goal else 0 }} }">
          <label class="block text-sm font-medium text-slate-700 mb-1.5">
            目前進度：<span class="text-indigo-600 font-bold" x-text="progress + '%'"></span>
          </label>
          <input type="range" name="progress" min="0" max="100" x-model="progress"
                 class="w-full accent-indigo-600">
          <div class="flex justify-between text-xs text-slate-400 mt-1">
            <span>0%</span><span>50%</span><span>100%</span>
          </div>
        </div>

        <!-- 按鈕 -->
        <div class="flex gap-3 pt-2">
          <button type="submit"
                  class="flex-1 py-2.5 rounded-xl text-white text-sm font-medium hover:opacity-90 transition"
                  style="background: linear-gradient(135deg, #4338ca, #6366f1);">
            {{ action }}目標
          </button>
          <a href="{{ url_for('goals.detail', id=goal.id) if goal else url_for('goals.index') }}"
             class="px-6 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 transition">
            取消
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
